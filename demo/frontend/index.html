<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xinsere — Secure Files</title>
<style>
  :root{
    --bg:#0A0713;--bg-2:#0F0B1E;--panel:rgba(255,255,255,0.035);--panel-2:rgba(146,119,255,0.06);--menu-bg:#17112A;
    --edge:rgba(146,119,255,0.16);--edge-strong:rgba(146,119,255,0.34);
    --violet-br:#8A6BFF;--violet:#5B3DF5;--violet-deep:#2E2170;--word:#9277FF;
    --mint:#4FE3C1;--coral:#FF8B7A;--text:#ECE9F8;--muted:#9A93B8;--faint:#6E6688;
    --glow-a:rgba(124,91,255,0.18);--glow-b:rgba(46,33,112,0.4);
    --chrome:rgba(10,7,19,0.7);--input-bg:rgba(0,0,0,0.28);--task-bg:#17122b;
    --track:rgba(255,255,255,0.18);--scrim:rgba(6,4,14,0.66);
    --icon-bg:rgba(150,124,255,0.22);--icon-edge:rgba(150,124,255,0.4);
    --radius:16px;--font:"Poppins","Outfit","Plus Jakarta Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    color-scheme:dark;
  }
  /* Light theme: same violet/mint brand, inverted canvas. Toggled via
     data-theme on <html>; persisted in localStorage. Dark is the default. */
  :root[data-theme="light"]{
    --bg:#F4F2FB;--bg-2:#FFFFFF;--panel:rgba(91,61,245,0.05);--panel-2:rgba(91,61,245,0.09);--menu-bg:#FFFFFF;
    --edge:rgba(91,61,245,0.18);--edge-strong:rgba(91,61,245,0.38);
    --word:#5B3DF5;--mint:#0C9E81;--coral:#D94F3C;
    --text:#1B1633;--muted:#565073;--faint:#8B85A8;
    --glow-a:rgba(124,91,255,0.12);--glow-b:rgba(46,33,112,0.07);
    --chrome:rgba(255,255,255,0.78);--input-bg:rgba(91,61,245,0.06);--task-bg:#FFFFFF;
    --track:rgba(27,22,51,0.14);--scrim:rgba(28,20,54,0.35);
    --icon-bg:rgba(91,61,245,0.09);--icon-edge:rgba(91,61,245,0.22);
    color-scheme:light;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--font);color:var(--text);
    background:radial-gradient(120% 90% at 88% -10%,var(--glow-a),transparent 55%),
      radial-gradient(110% 90% at 5% 110%,var(--glow-b),transparent 55%),var(--bg);
    -webkit-font-smoothing:antialiased;}
  button{font:inherit;cursor:pointer;}
  .hidden{display:none !important;}

  /* login */
  #login{position:fixed;inset:0;display:grid;place-items:center;z-index:40;
    background:radial-gradient(120% 90% at 80% -10%,var(--glow-a),transparent 55%),var(--bg);}
  .login-card{width:340px;background:var(--panel);border:1px solid var(--edge);border-radius:20px;
    padding:30px 28px;backdrop-filter:blur(14px);text-align:center;}
  .login-card svg{width:52px;height:52px;margin-bottom:14px;}
  .login-card .word{font-size:1.5rem;font-weight:600;letter-spacing:-0.03em;
    background:linear-gradient(90deg,var(--violet),var(--word));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .login-card p{color:var(--muted);font-size:0.85rem;margin:4px 0 20px;}
  .field{text-align:left;margin-bottom:12px;}
  .field label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--faint);}
  .field input{width:100%;margin-top:5px;padding:11px 13px;border-radius:10px;background:var(--input-bg);
    border:1px solid var(--edge);color:var(--text);font:inherit;}
  .field input:focus{outline:2px solid var(--violet);border-color:transparent;}
  .login-hint{font-size:0.74rem;color:var(--faint);margin-top:14px;line-height:1.6;}
  .login-err{color:var(--coral);font-size:0.8rem;min-height:1.1em;margin-top:8px;}
  .linkbtn{background:none;border:0;color:var(--word);font:inherit;font-size:0.74rem;cursor:pointer;padding:0;text-decoration:underline;}
  .linkbtn:hover{color:var(--text);}

  .btn{font-size:0.85rem;font-weight:600;border-radius:10px;padding:10px 16px;border:1px solid transparent;transition:filter .15s,background .15s;color:#fff;background:linear-gradient(135deg,var(--violet-br),var(--violet));box-shadow:0 6px 18px -8px var(--violet);}
  .btn:hover{filter:brightness(1.08);}
  .btn.full{width:100%;}
  .btn-ghost{color:var(--word);background:transparent;border-color:var(--edge-strong);box-shadow:none;}
  .btn-ghost:hover{background:var(--panel-2);}

  /* app shell */
  #app{display:grid;grid-template-rows:auto 1fr;height:100vh;}
  .topbar{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--edge);background:var(--chrome);backdrop-filter:blur(10px);}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand svg{width:30px;height:30px;}
  .brand .word{font-size:1.24rem;font-weight:600;letter-spacing:-0.03em;background:linear-gradient(90deg,var(--violet),var(--word));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .me{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:0.86rem;}
  .avatar{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:0.68rem;font-weight:700;color:#120c26;}
  .link{color:var(--muted);background:none;border:0;font-size:0.82rem;text-decoration:none;cursor:pointer;}
  .link:hover{color:var(--text);}

  .body{display:grid;grid-template-columns:220px 1fr;min-height:0;}
  .side{border-right:1px solid var(--edge);padding:16px 12px;display:flex;flex-direction:column;gap:4px;}
  .side .nav{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);font-size:0.9rem;border:0;background:none;width:100%;text-align:left;}
  .side .nav:hover{background:var(--panel-2);color:var(--text);}
  .side .nav.active{background:linear-gradient(135deg,rgba(138,107,255,0.2),rgba(91,61,245,0.12));color:#fff;border:1px solid var(--edge);}
  .side .ico{flex:0 0 auto;width:20px;text-align:center;}
  .side .lbl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .side-toggle{margin-top:auto;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--faint);font-size:0.82rem;border:0;background:none;width:100%;text-align:left;cursor:pointer;}
  .side-toggle:hover{background:var(--panel-2);color:var(--text);}
  /* Collapsed rail — icons only, labels in tooltips. State persists (xin-side). */
  .body.side-min{grid-template-columns:58px 1fr;}
  .body.side-min .side{padding:16px 7px;}
  .body.side-min .side .lbl{display:none;}
  .body.side-min .side .nav,.body.side-min .side-toggle{justify-content:center;padding:10px 0;gap:0;}
  .side .grp{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.13em;color:var(--faint);margin:16px 12px 6px;}

  .main{padding:20px 24px;overflow:auto;min-width:0;}
  .bar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
  .crumbs{display:flex;align-items:center;gap:6px;font-size:0.95rem;min-width:0;}
  .crumbs button{background:none;border:0;color:var(--muted);font:inherit;padding:2px 4px;border-radius:6px;}
  .crumbs button:hover{color:var(--text);}
  .crumbs .cur{color:var(--text);font-weight:600;}
  .crumbs .sep{color:var(--faint);}
  .tools{margin-left:auto;display:flex;gap:8px;}

  /* container reads as a clean panel; the dashed drop affordance only appears
     while dragging files over it */
  .drop{border:1px solid var(--edge);border-radius:14px;transition:border-color .15s,background .15s;}
  .drop.over{border:1.5px dashed var(--mint);background:rgba(79,227,193,0.06);}
  /* drag-to-move: dim the item being dragged; ring the folder it's over */
  .tile.dragging,.lrow.dragging{opacity:.45;}
  .tile.drop-target{border-color:var(--mint);box-shadow:0 0 0 2px var(--mint) inset;background:rgba(79,227,193,0.08);}
  .lrow.drop-target{background:rgba(79,227,193,0.12);box-shadow:0 0 0 1.5px var(--mint) inset;border-radius:8px;}
  .crumbs button.drop-target{background:rgba(79,227,193,0.16);color:var(--text);box-shadow:0 0 0 1.5px var(--mint) inset;}
  /* inline rename input sits exactly where the name text was */
  .rn-input{font:inherit;color:inherit;background:var(--panel-2,rgba(255,255,255,.06));
    border:1px solid var(--mint);border-radius:6px;padding:1px 6px;margin:-2px 0;width:100%;max-width:100%;min-width:80px;box-sizing:border-box;outline:none;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px;padding:16px;min-height:120px;}
  .tile{position:relative;background:var(--panel);border:1px solid var(--edge);border-radius:13px;padding:16px 14px;transition:border-color .15s,transform .1s;cursor:default;}
  .tile:hover{border-color:var(--edge-strong);}
  .tile.folder{cursor:pointer;}
  .tile.folder:hover{transform:translateY(-2px);}
  .tile .ic{width:44px;height:44px;border-radius:11px;display:grid;place-items:center;font-size:1.3rem;margin-bottom:11px;}
  .tile.folder .ic{background:rgba(224,164,74,0.13);color:#E0A44A;border:1px solid rgba(224,164,74,0.28);}
  .tile.file .ic{background:var(--icon-bg);color:var(--word);border:1px solid var(--icon-edge);}
  .tile .nm{font-size:0.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tile .mt{font-size:0.72rem;color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums;}
  .tile .secured{color:var(--mint);}
  .tile .sha{font-size:0.66rem;color:var(--faint);margin-top:6px;font-family:"JetBrains Mono",ui-monospace,"Consolas",monospace;letter-spacing:-0.02em;}
  .tile .sha b{color:var(--mint);font-weight:600;}
  .tile .acts{display:flex;gap:6px;margin-top:12px;}
  .tile .acts .mini{font-size:0.74rem;font-weight:600;padding:6px 10px;border-radius:8px;border:1px solid var(--edge-strong);background:transparent;color:var(--word);}
  .tile .acts .mini:hover{background:var(--panel-2);}
  .tile .acts .mini.dl{color:#fff;background:linear-gradient(135deg,var(--violet-br),var(--violet));border-color:transparent;}
  /* icon-only action buttons — fixed footprint so tiles never overflow */
  .iconbtn{display:inline-grid;place-items:center;width:34px;height:30px;padding:0;
    border:1px solid var(--edge-strong);border-radius:8px;background:transparent;
    color:var(--word);cursor:pointer;flex:none;}
  .iconbtn:hover{background:var(--panel-2);}
  .iconbtn.dl{color:#fff;background:linear-gradient(135deg,var(--violet-br),var(--violet));border-color:transparent;}
  .iconbtn:disabled{opacity:.4;cursor:default;}
  .iconbtn .svgi{width:15px;height:15px;}
  .tile .shared{display:flex;gap:-6px;margin-top:10px;align-items:center;}
  .tile .shared .avatar{width:20px;height:20px;font-size:0.6rem;margin-right:-6px;border:2px solid var(--bg-2);}
  .tile .proof{display:block;font-size:0.68rem;color:var(--mint);margin-top:8px;text-decoration:none;}
  .tile .owner{font-size:0.72rem;color:var(--faint);margin-top:6px;}

  .empty{grid-column:1/-1;text-align:center;color:var(--faint);padding:50px 0;}
  .empty .o{width:44px;height:44px;margin:0 auto 12px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(124,91,255,0.5),rgba(46,33,112,0.5));opacity:0.6;}

  /* inline SVG icon system */
  .svgi{width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none;vertical-align:-0.14em;}
  .svgi.dots{fill:currentColor;stroke:none;}
  .iconbtn{background:transparent;border:0;color:var(--muted);border-radius:8px;padding:6px;display:inline-grid;place-items:center;font-size:1.05rem;line-height:1;}
  .iconbtn:hover{background:var(--panel-2);color:var(--text);}
  .secured-i{color:var(--mint);font-size:0.95rem;display:inline-grid;place-items:center;}

  /* view toggle */
  .viewtoggle{display:inline-flex;border:1px solid var(--edge);border-radius:9px;overflow:hidden;margin-left:auto;}
  .viewtoggle button{background:transparent;border:0;color:var(--muted);padding:7px 9px;font-size:1rem;display:grid;place-items:center;}
  .viewtoggle button.on{background:var(--panel-2);color:var(--text);}

  /* LIST VIEW — compact rows (default). Header + rows share ONE grid template
     so columns always line up. */
  #grid.listview{display:block;padding:4px;min-height:auto;}
  .lhead,.lrow{display:grid;grid-template-columns:22px 34px minmax(0,1fr) 60px 148px 78px 96px 116px;align-items:center;gap:12px;padding:9px 14px;}
  .lhead{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--faint);border-bottom:1px solid var(--edge);}
  .lhead span[data-sort]{cursor:pointer;-webkit-user-select:none;user-select:none;white-space:nowrap;}
  .lhead span[data-sort]:hover{color:var(--muted);}
  .lhead span[data-sort].sort-on{color:var(--text);}
  .col-mod{color:var(--muted);font-size:0.74rem;white-space:nowrap;font-variant-numeric:tabular-nums;}
  .lrow{border-radius:9px;cursor:default;}
  .lrow:hover{background:var(--panel-2);}
  .lrow.folder{cursor:pointer;}
  .lrow .ic{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;background:var(--icon-bg);color:var(--word);border:1px solid var(--icon-edge);}
  .lrow.folder .ic{color:#E0A44A;background:rgba(224,164,74,0.13);border-color:rgba(224,164,74,0.28);}
  .lrow .ic .svgi{width:17px;height:17px;stroke-width:1.9;}
  .lrow .nm{font-weight:600;font-size:0.86rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lrow .nm .sub{display:block;font-weight:400;font-size:0.7rem;color:var(--faint);margin-top:1px;overflow:hidden;text-overflow:ellipsis;}
  .col-type{color:var(--muted);font-size:0.74rem;text-transform:uppercase;}
  .col-size{color:var(--muted);font-size:0.78rem;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:6px;}
  .col-share{display:flex;align-items:center;}
  .col-act{display:flex;align-items:center;justify-content:flex-end;gap:4px;}
  .lrow .shared,.lhead .shared{display:flex;align-items:center;}
  .lrow .shared .avatar{width:22px;height:22px;font-size:0.6rem;margin-right:-7px;border:2px solid var(--task-bg);}
  .lrow .mini.dl{font-size:0.74rem;font-weight:600;padding:5px 13px;border-radius:8px;border:0;color:#fff;background:linear-gradient(135deg,var(--violet-br),var(--violet));}
  /* Column responsiveness keys off the list's ACTUAL container (.main), not the
     viewport — whether columns fit depends on the sidebar being open or a rail.
     Tiers: full → drop Type+Shared → drop Modified. Name never collapses. */
  .main{container-type:inline-size;}
  @container (max-width:920px){
    .lhead,.lrow{grid-template-columns:22px 34px minmax(0,1fr) 148px 96px 116px;}
    .col-type,.col-share{display:none;}
  }
  @container (max-width:640px){
    .lhead,.lrow{grid-template-columns:22px 34px minmax(0,1fr) 120px 116px;}
    .col-mod{display:none;}
  }
  /* Fallback for browsers without container queries (pre-2023). */
  @supports not (container-type: inline-size){
    @media(max-width:680px){
      .lhead,.lrow{grid-template-columns:22px 34px minmax(0,1fr) 120px 116px;}
      .col-type,.col-share,.col-mod{display:none;}
    }
  }
  /* GRID VIEW — tightened cards */
  #grid:not(.listview) .tile{padding:13px 12px;}
  #grid:not(.listview) .tile .ic{width:40px;height:40px;margin-bottom:9px;}
  #grid:not(.listview) .tile .ic .svgi{width:20px;height:20px;}

  /* MULTI-SELECT — checkbox column (list), hover checks (grid), selection tint */
  .selbox{width:15px;height:15px;flex:none;accent-color:var(--violet);cursor:pointer;margin:0;}
  .lrow.selected{background:rgba(138,107,255,.10);}
  .tile{position:relative;}
  .tile.selected{background:rgba(138,107,255,.10);border-color:var(--violet);}
  .tile .selbox{position:absolute;top:9px;left:9px;z-index:2;opacity:0;transition:opacity .12s;}
  .tile:hover .selbox,.tile .selbox:checked,#grid.has-sel .tile .selbox{opacity:1;}
  .selinfo{display:inline-flex;align-items:center;gap:8px;font-size:.82rem;color:var(--word);
    border:1px solid var(--edge-strong);border-radius:999px;padding:3px 6px 3px 12px;white-space:nowrap;}
  .selinfo button{background:transparent;border:0;color:var(--muted);cursor:pointer;font-size:.9rem;line-height:1;padding:2px 6px;}
  .selinfo button:hover{color:var(--text);}

  /* modal */
  /* Stacking: dialogs (90) and task toasts (92) must sit ABOVE the viewer (80) —
     the viewer's share/rename/move actions open them while it's up. ctx menus 95. */
  .modal-bg{position:fixed;inset:0;background:var(--scrim);display:grid;place-items:center;z-index:90;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);}
  .modal{width:360px;background:var(--bg-2);border:1px solid var(--edge-strong);border-radius:18px;padding:22px;}
  .modal h3{margin:0 0 4px;font-size:1.02rem;}
  .modal .msub{color:var(--muted);font-size:0.82rem;margin:0 0 16px;}
  .modal .btn.full{margin-top:2px;}
  .modal .choice-cap{color:var(--faint);font-size:0.76rem;line-height:1.4;text-align:center;margin:7px 6px 16px;}
  .modal .x-cancel{display:block;margin:2px auto 0;}
  .people{display:flex;flex-direction:column;gap:8px;}
  .person{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;border:1px solid var(--edge);background:transparent;color:var(--text);text-align:left;}
  .person:hover{border-color:var(--word);background:var(--panel-2);}
  .person:disabled{opacity:0.45;}
  .person .nm{font-weight:600;font-size:0.9rem;}
  .person .st{margin-left:auto;font-size:0.72rem;color:var(--mint);}
  .modal .x{margin-top:14px;}

  /* Task stack: one status line per concurrent operation (downloads, uploads,
     notices) so parallel transfers never fight over a single message. */
  .tasks{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;align-items:center;z-index:92;pointer-events:none;}
  /* container ignores pointer events so it never blocks the page; each task
     card re-enables them so its Undo button is clickable */
  .task{background:var(--task-bg);border:1px solid var(--edge-strong);color:var(--text);padding:11px 16px;border-radius:12px;font-size:0.85rem;display:flex;flex-direction:column;gap:8px;align-items:stretch;min-width:300px;max-width:min(92vw,460px);box-shadow:0 18px 50px -12px rgba(0,0,0,0.7);opacity:0;transform:translateY(14px);transition:opacity .25s,transform .25s;pointer-events:auto;}
  .task.show{opacity:1;transform:translateY(0);}
  .task .trow{display:flex;gap:10px;align-items:center;}
  .task .tname{color:var(--faint);font-size:0.74rem;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:none;}
  .task .tick{display:none;color:var(--mint);font-weight:700;}
  .task.done .tick{display:inline;}
  .task.err .tick{color:var(--coral);}
  .task .spin{width:14px;height:14px;border:2px solid var(--track);border-top-color:var(--mint);border-radius:50%;animation:spin .7s linear infinite;flex:none;}
  .task.done .spin{display:none;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .task .bar{display:none;height:5px;border-radius:99px;background:var(--track);overflow:hidden;}
  .task.progress .bar{display:block;}
  .task .fill{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,var(--word),var(--mint));transition:width .18s ease;}
  .task.indet .fill{width:40%;transition:none;animation:indet 1.1s ease-in-out infinite;}
  @keyframes indet{0%{margin-left:-42%}100%{margin-left:102%}}
  .mini.dl{white-space:nowrap;min-width:94px;text-align:center;}
  .mini.dl.loading{pointer-events:none;opacity:.8;}
  .btnspin{display:inline-block;width:12px;height:12px;border:2px solid var(--track);border-top-color:var(--word);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
  /* tile kebab menu (owner file management) */
  .kebab{border:0;background:transparent;color:var(--faint);border-radius:8px;width:28px;height:28px;display:grid;place-items:center;font-size:1rem;line-height:1;}
  .kebab:hover{background:var(--panel-2);color:var(--text);}
  .tile>.kebab{position:absolute;top:8px;right:8px;opacity:0;transition:opacity .12s;}
  .tile:hover>.kebab{opacity:1;}
  /* shield badge: everything in Xinsere is secured — one quiet mark, top-right */
  .tile>.sec-badge{position:absolute;top:10px;right:11px;color:var(--mint);opacity:.8;transition:opacity .12s;}
  .tile>.sec-badge .svgi{width:14px;height:14px;}
  .tile:has(>.kebab):hover>.sec-badge{opacity:0;}   /* yield the corner to the kebab on hover */
  .ctx{position:fixed;z-index:95;background:var(--task-bg);border:1px solid var(--edge-strong);border-radius:11px;padding:6px;min-width:172px;box-shadow:0 14px 40px -10px rgba(0,0,0,0.55);display:flex;flex-direction:column;}
  .ctx button{background:transparent;border:0;color:var(--text);text-align:left;padding:8px 11px;border-radius:8px;font-size:0.84rem;display:flex;align-items:center;gap:10px;}

/* Password-recovery safety net: if GoTrue's redirect allowlist rejects our
 * /security?step=pw redirect_to, it falls back to the Site URL (here) with the
 * recovery session still in the URL fragment. Forward it to the page that can
 * actually finish the reset. */
if(/[#&](type=recovery|error_description=)/.test(location.hash))
  location.replace("/security?step=pw"+location.hash);

const api = (path, opts={}) => fetch(path, {credentials:"same-origin", ...opts});
const $ = (s)=>document.querySelector(s);
function mark(el){ el.appendChild(document.getElementById("mark").content.cloneNode(true)); }
mark($("#login-mark")); mark($("#top-mark"));

/* ---- theme toggle (dark default; persisted) ---- */
function syncThemeButtons(){
  const light=document.documentElement.dataset.theme==="light";
  document.querySelectorAll(".theme-toggle").forEach(b=>{ b.textContent=light?"☾":"☀"; });
}
document.querySelectorAll(".theme-toggle").forEach(b=>b.addEventListener("click",()=>{
  const next=document.documentElement.dataset.theme==="light"?"dark":"light";
  document.documentElement.dataset.theme=next;
  localStorage.setItem("xin-theme",next);
  syncThemeButtons();
}));

/* ---- collapsible sidebar ----
 * Wide screens: the «/» toggle sets a persisted preference.
 * Narrow screens (<1100px): ALWAYS auto-collapse to the icon rail on resize —
 * the table views need the width. Expanding while narrow is a session override
 * that resets once the window is wide again. */
const bodyEl=document.querySelector(".body"), sideToggle=$("#side-toggle");
if(bodyEl&&sideToggle){
  const NARROW=1100;
  let sideUser=localStorage.getItem("xin-side");   // wide-screen preference
  let narrowExpand=false;                          // user expanded while narrow
  const isNarrow=()=>window.innerWidth<NARROW;
  const applySide=()=>{
    const min=isNarrow()?!narrowExpand:sideUser==="min";
    bodyEl.classList.toggle("side-min",min);
    sideToggle.querySelector(".ico").textContent=min?"»":"«";
    sideToggle.title=min?"Expand sidebar":"Collapse sidebar";
  };
  sideToggle.addEventListener("click",()=>{
    const min=bodyEl.classList.contains("side-min");
    if(isNarrow()) narrowExpand=min;
    else { sideUser=min?"full":"min"; localStorage.setItem("xin-side",sideUser); }
    applySide();
  });
  let rT=null;
  window.addEventListener("resize",()=>{ clearTimeout(rT); rT=setTimeout(()=>{
    if(!isNarrow()) narrowExpand=false;
    applySide();
  },120); });
  applySide();
}
syncThemeButtons();

let ME=null, OTHERS=[], VIEW="mine", CURRENT=null; // CURRENT folder id
let LAYOUT=localStorage.getItem("xin-layout")||"list";  // list (default) | grid
let LAST=[], LAST_MANAGE=true;                           // last rendered set, for view re-render
let TRASH_MODE=false;                                    // rendering the Trash view (Restore/Erase actions)

/* ---- multi-select (list + grid): checkbox column, shift+click range,
 * ctrl/cmd+click toggle; bulk actions via right-click / kebab / row icons.
 * Selection lives on node ids over LAST; cleared on navigation, preserved
 * across a list<->grid layout toggle (same LAST reference). ---- */
let SEL=new Set(), SEL_ANCHOR=-1;
function selClear(){ SEL.clear(); SEL_ANCHOR=-1; }
function selNodes(){ return LAST.filter(n=>SEL.has(n.id)); }
function selToggle(id){ SEL.has(id)?SEL.delete(id):SEL.add(id); }
function selRange(a,b){ const [lo,hi]=a<b?[a,b]:[b,a];
  for(let i=lo;i<=hi&&i<LAST.length;i++) SEL.add(LAST[i].id); }
function refreshSelUI(){

// at upload and travels with the bytes; renaming can't change it. We use this to

const MIME_EXT={
  "application/pdf":"pdf","application/msword":"doc",
  "application/vnd.openxmlformats-officedocument.wordprocessingml.document":"docx",
  "application/vnd.ms-powerpoint":"ppt",
  "application/vnd.openxmlformats-officedocument.presentationml.presentation":"pptx",

  "video/mp4":"mp4","video/quicktime":"mov","video/x-msvideo":"avi","video/webm":"webm",
  "audio/mpeg":"mp3","audio/wav":"wav","text/plain":"txt","text/csv":"csv",

// Reconcile a display name's extension with the file's real type so the download
// always opens — a file can be labelled anything, but it can't masquerade as
// another type on the way out.
function dlName(name, ct){ const ext=trueExt(ct); if(!ext) return name;
  if(new RegExp("\\."+ext+"$","i").test(name)) return name;

/* Task stack: each long operation gets its OWN status line, so concurrent
 * downloads/uploads never flicker over each other.
 *   const T=newTask("video.mp4");
 *   T.set(msg)                    sticky spinner line
 *   T.set(msg,{pct:42})           determinate progress bar
 *   T.set(msg,{indet:true})       indeterminate animated bar
 *   T.done(msg)                   final state, auto-removes after 3.2s
 */
function newTask(name){
  const el=document.createElement("div"); el.className="task";
  const nm=document.createElement("span"); nm.className="tname"; nm.textContent=name||""; nm.title=name||"";
  el.innerHTML='<div class="trow"><span class="spin"></span><span class="tick">✓</span><span class="tmsg"></span></div><div class="bar"><div class="fill"></div></div>';
  if(name) el.querySelector(".trow").insertBefore(nm, el.querySelector(".tmsg"));
  $("#tasks").appendChild(el);
  requestAnimationFrame(()=>el.classList.add("show"));
  const msgEl=el.querySelector(".tmsg"), fill=el.querySelector(".fill");
  function finish(msg){ msgEl.textContent=msg; el.classList.add("done"); el.classList.remove("progress","indet");
    // Error lines get a coral ✗, not the success tick — "On-chain grant failed ✓"
    // read as success (2026-07-21). Callers can also just prefix ✗ themselves.
    if(/✗|\bfail(ed|ure)?\b|\berror\b|\bdenied\b|\bnot completed\b|\binvalid\b/i.test(msg)){
      el.classList.add("err"); const t=el.querySelector(".tick"); if(t) t.textContent="✗";
    }
    setTimeout(()=>{ el.classList.remove("show"); setTimeout(()=>el.remove(),300); },3200); }
  return {
    set(msg,o){ o=o||{}; msgEl.textContent=msg;
      el.classList.toggle("progress", o.pct!=null||!!o.indet);
      el.classList.toggle("indet", !!o.indet);
      if(o.pct!=null) fill.style.width=Math.max(0,Math.min(100,o.pct)).toFixed(0)+"%"; },
    done: finish,
  };
}

// One-off notices (folder created, share results, errors) — a transient task line.
function toast(msg){ newTask("").done(msg); }

// A result line with an Undo action (reversible ops — rename now, move/trash next).
// Auto-dismisses after ~7s; Undo runs the supplied reverser.
function undoToast(msg, undoFn){
  const el=document.createElement("div"); el.className="task done";
  el.innerHTML='<div class="trow"><span class="tick">✓</span><span class="tmsg"></span><button class="undo">Undo</button></div>';
  el.querySelector(".tmsg").textContent=msg;
  $("#tasks").appendChild(el); requestAnimationFrame(()=>el.classList.add("show"));
  let closed=false;
  const kill=()=>{ if(closed) return; closed=true; el.classList.remove("show"); setTimeout(()=>el.remove(),300); };
  el.querySelector(".undo").onclick=async ()=>{ const b=el.querySelector(".undo"); b.disabled=true; b.textContent="Undoing…";
    try{ await undoFn(); }catch(e){ toast("✗ Undo failed"); } kill(); };
  setTimeout(kill, 7000);
}

function assetGroup(n){

  if(ct.startsWith("image/"))return "Images";
  if(ct.startsWith("video/"))return "Video";
  if(ct.startsWith("audio/"))return "Audio";
  if(ct==="application/pdf"||ct.includes("word")||ct.includes("presentation")||ct.includes("spreadsheet")||ct.includes("msword")||ct.startsWith("text/")||ct.includes("json"))return "Documents";
  return "Other";
}
const GROUP_ORDER=["Folders","Documents","Images","Video","Audio","Other"];
function groupResults(results){
  const g={};
  results.forEach(n=>{ (g[assetGroup(n)]=g[assetGroup(n)]||[]).push(n); });
  return GROUP_ORDER.filter(k=>g[k]).map(k=>[k,g[k]]);
}
// Jump straight to an item's folder in ONE navigation. setView("mine") first
// would load + push the home screen (flash of My Files, a phantom Back stop,
// and a race between the two tree fetches) — switch the nav state directly.
function openLocation(n){
  VIEW="mine"; markNav(); $("#tools").style.visibility="visible";

}
function openResult(n){
  gsClose();

  openLocation(n);   // no preview: open its location
}
const gsQ=$("#gs-q"), gsDrop=$("#gs-drop");
let gsTimer=null, gsSeq=0, gsLast=[];
function gsClose(){ gsDrop.classList.add("hidden"); }
async function gsFetch(term, limit){
  const r=await api("/api/search?q="+encodeURIComponent(term)+(limit?"&limit="+limit:""));
  if(!r.ok) return null;
  return (await r.json()).results||[];
}
gsQ.addEventListener("input",()=>{
  clearTimeout(gsTimer);
  const term=gsQ.value.trim(); const mine=++gsSeq;
  if(term.length<2){ gsClose(); return; }
  gsTimer=setTimeout(async()=>{

    gsDrop.innerHTML="";

    else{

/* Compact list rows (default) — the app-like layout. */
// Column sorting: persists across navigation until changed; folders always stay
// grouped above files (file-manager convention), the key sorts within each group.
let LSORT={key:null,dir:1};
const LSORTERS={
  name:(a,b)=>(a.name||"").localeCompare(b.name||"",undefined,{numeric:true,sensitivity:"base"}),
  type:(a,b)=>(a.type==="folder"?"folder":(typeLabel(a.content_type)||"file"))
      .localeCompare(b.type==="folder"?"folder":(typeLabel(b.content_type)||"file")),
  size:(a,b)=>(a.size||0)-(b.size||0),
  shared:(a,b)=>((a.shared_with||[]).length)-((b.shared_with||[]).length),
  modified:(a,b)=>new Date(a.created_at||0)-new Date(b.created_at||0),
};
function fmtDate(d){ return d?new Date(d).toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}):"—"; }

function renderList(g, children, canManage){
  const trash=TRASH_MODE;
  if(LSORT.key&&LSORTERS[LSORT.key]){
    const cmp=LSORTERS[LSORT.key];
    // In place: display order == array order, so shift-select ranges stay correct.
    children.sort((a,b)=>{
      const fa=a.type==="folder", fb=b.type==="folder";
      if(fa!==fb) return fa?-1:1;
      return cmp(a,b)*LSORT.dir || LSORTERS.name(a,b);
    });
  }
  const hcol=(key,cls,label,tip)=>{
    const on=LSORT.key===key;
    return `<span class="${cls}${on?" sort-on":""}" data-sort="${key}" `+
      `title="Sort by ${tip}">${label}${on?(LSORT.dir===1?" ▲":" ▼"):""}</span>`;
  };
  const head=document.createElement("div"); head.className="lhead";
  head.innerHTML=`<span>${trash?"":'<input type="checkbox" class="selbox" id="selall" title="Select all">'}</span>`+
    `<span style="width:30px"></span>`+

    hcol("shared","col-share","Shared","share count")+
    hcol("modified","col-mod","Modified","date added")+

  head.querySelectorAll("[data-sort]").forEach(h=>h.addEventListener("click",()=>{
    const k=h.dataset.sort;

  if(selall) selall.addEventListener("click",()=>{

  children.forEach((n,idx)=>{

      if(!trash) r.querySelector(".col-act").appendChild(
        iconBtn("download","Download folder as ZIP",(e,b)=>{ if(SEL.size>1&&SEL.has(n.id)) bulkDownload(selNodes()); else downloadFolder(n,b); },"dl"));
    } else {
      r.innerHTML=selcell+`<span class="ic">${fileIconHtml(n.name)}</span>`+
        `<span class="nm" title="${esc(n.name)}">${esc(n.name)}<span class="sub">SHA-256 ${(n.sha256||"").slice(0,12)}…</span></span>`+
        `<span class="col-type">${typeLabel(n.content_type)||"—"}</span>`+
        `<span class="col-size"><span class="secured-i" title="${n.frags} fragments · AES-256-GCM · on-chain permissioned">${svg("shield")}</span> ${fmtSize(n.size)}</span>`+
        `<span class="col-share">${facepile(n)}</span>`+

      if(!trash){

/* ---- file management: kebab menu, rename, move, delete ---- */
function kebab(n, opts){
  const b=document.createElement("button"); b.className="kebab"; b.innerHTML=svg("dots","dots"); b.title="More actions";
  // With a multi-selection that includes this item, ••• acts on the whole selection.
  b.onclick=(e)=>{ e.stopPropagation(); if(SEL.size>1&&SEL.has(n.id)) openMultiCtx(e); else openCtx(e, n, opts); };
  return b;
}

/* ---- bulk actions over the current selection ---- */
function bulkDownload(nodes){
  // Each item gets its own task line (the task stack handles concurrency);
  // folders arrive as ZIPs, files individually — watermark rules apply per file.
  nodes.forEach(n=>{ if(n.type==="folder") downloadFolder(n,null); else if((n.access||"download")!=="view") downloadFile(n,null); });
  const skipped=nodes.filter(n=>n.type!=="folder"&&(n.access||"download")==="view").length;
  if(skipped) toast(`${skipped} view-only file${skipped>1?"s":""} skipped (no download access)`);
}
async function bulkTrash(nodes){
  if(!confirm(`Move ${nodes.length} items to Trash?\n\nRecoverable for 30 days, then auto-erased.`)) return;
  const T=newTask(`${nodes.length} items`); T.set("Moving to Trash…",{indet:true});
  let ok=0, failed=0;
  const done=[];
  for(const n of nodes){
    const fd=new FormData(); fd.append("node_id",n.id);
    const r=await api("/api/delete",{method:"POST",body:fd});
    if(r.ok){ ok++; done.push(n); } else failed++;
  }
  T.done(failed?`Moved ${ok}/${nodes.length} to Trash — ${failed} failed`:`${ok} item${ok>1?"s":""} moved to Trash`);
  selClear();
  openFolder(CURRENT);
  if(done.length) undoToast(`${done.length} item${done.length>1?"s":""} moved to Trash`, async ()=>{
    for(const n of done){ const f2=new FormData(); f2.append("node_id",n.id); await api("/api/restore",{method:"POST",body:f2}); }
    openFolder(CURRENT);
  });
}
function openMultiCtx(e){
  const nodes=selNodes(); if(!nodes.length) return;
  document.querySelectorAll(".ctx").forEach(el=>el.remove());
  const m=document.createElement("div"); m.className="ctx";
  const add=(icon, label, fn, danger)=>{ const x=document.createElement("button");
    x.innerHTML=svg(icon)+`<span>${label}</span>`; if(danger) x.className="danger";
    x.onclick=()=>{ m.remove(); fn(); }; m.appendChild(x); };
  const N=nodes.length;
  add("download", `Download ${N} items`, ()=>bulkDownload(nodes));
  // Move/Trash need ownership of everything selected (share/rename stay per-item).
  if(nodes.every(n=>n.owner===ME.id)){
    add("moveto", `Move ${N} items to…`, ()=>openMove(nodes));
    add("trash", `Move ${N} items to Trash`, ()=>bulkTrash(nodes), true);
  }
  document.body.appendChild(m);
  const r=m.getBoundingClientRect();
  m.style.left=Math.min(e.clientX, innerWidth-r.width-10)+"px";
  m.style.top=Math.min(e.clientY, innerHeight-r.height-10)+"px";
  setTimeout(()=>addEventListener("click", ()=>m.remove(), {once:true}));
}
document.addEventListener("keydown",(e)=>{
  if(e.key==="Escape" && SEL.size){ selClear(); refreshSelUI(); }
  // F2 renames the single selected item in place (Drive/Explorer convention). Ignore
  // while typing in a field or when a modal/preview is up, and only for your own items.
  if(e.key==="F2" && SEL.size===1 && !/^(INPUT|TEXTAREA|SELECT)$/.test((e.target.tagName||""))
     && !document.querySelector(".modal-bg, .viewer-bg")){

});
function openCtx(e, n, opts){
  // Full action menu for ONE item — opened from the ••• kebab or a right-click.
  // Permission-aware: view/download for anyone with access, share for owner or
  // co-owner, manage (rename/move/delete/proof) for the owner only.
  // opts.inViewer: opened from the preview overlay — drop the redundant View
  // entry and close the viewer before destructive actions (the file is going away).
  opts=opts||{};
  document.querySelectorAll(".ctx").forEach(el=>el.remove());
  const m=document.createElement("div"); m.className="ctx";
  const add=(icon, label, fn, danger)=>{ const x=document.createElement("button");
    x.innerHTML=svg(icon)+`<span>${label}</span>`; if(danger) x.className="danger";
    x.onclick=()=>{ m.remove(); fn(); }; m.appendChild(x); };
  const mine=ME&&n.owner===ME.id;
  if(!opts.inViewer&&n.type!=="folder"&&previewKind(n.content_type)) add("eye","View",()=>openPreview(n));
  if(n.type==="folder") add("download","Download as ZIP",()=>downloadFolder(n,null));
  else if((n.access||"download")!=="view") add("download","Download",()=>downloadFile(n,null));
  if(mine||n.access==="co-owner") add("share", n.type==="folder"?"Share folder":"Share", ()=>openShare(n));
  if(mine){
    add("pencil", "Rename", ()=>renameItem(n));
    add("moveto", "Move to…", ()=>openMove(n));
    // Blockchain proof lives here now, not on the card face.
    const tx=n.shared_with&&n.shared_with[0]&&n.shared_with[0].tx;
    if(tx){ const full=tx.startsWith("0x")?tx:"0x"+tx;
      add("link", "View on-chain proof ↗", ()=>window.open("https://amoy.polygonscan.com/tx/"+full,"_blank","noopener")); }
    add("trash", "Delete", ()=>{ if(opts.onDestroy) opts.onDestroy(); deleteItem(n); }, true);
  }
  document.body.appendChild(m);
  const r=m.getBoundingClientRect();
  m.style.left=Math.min(e.clientX, innerWidth-r.width-10)+"px";
  m.style.top=Math.min(e.clientY, innerHeight-r.height-10)+"px";
  setTimeout(()=>addEventListener("click", ()=>m.remove(), {once:true}));
}

/* ---- duplicate-name conflict (Keep both / Cancel — Mark 2026-07-20) ---- */
// A small modal offered when the server 409s on a sibling name collision. There is
// deliberately NO destructive "Replace" — Keep both auto-suffixes " (n)", or Cancel.
function conflictDialog(message, suggestion){
  return new Promise(resolve=>{
    const bg=document.createElement("div"); bg.className="modal-bg";
    bg.innerHTML=`<div class="modal" style="width:min(420px,92vw);max-width:none;">
      <h3>Name already in use</h3>
      <p class="msub">${esc(message||"An item with that name already exists here.")}</p>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:14px;">
        <button class="btn full keep" type="button">Keep both — “${esc(suggestion||"")}”</button>
        <button class="btn-ghost btn full cancel" type="button">Cancel</button>
      </div></div>`;
    const done=v=>{ document.removeEventListener("keydown",onKey); if(bg.parentNode) bg.remove(); resolve(v); };
    const onKey=e=>{ if(e.key==="Escape"){ e.preventDefault(); done(false); } };
    bg.querySelector(".keep").onclick=()=>done(true);
    bg.querySelector(".cancel").onclick=()=>done(false);
    bg.addEventListener("click",e=>{ if(e.target===bg) done(false); });
    document.addEventListener("keydown",onKey);
    document.body.appendChild(bg); bg.querySelector(".keep").focus();
  });
}
// POST a management action; on a 409 name collision, offer Keep both / Cancel and
// retry with on_conflict=keep-both. Returns the final Response, or null if cancelled.
async function apiWithConflict(url, fields){
  const build=extra=>{ const fd=new FormData();
    Object.entries(Object.assign({}, fields, extra)).forEach(([k,v])=>fd.append(k,v)); return fd; };
  let r=await api(url,{method:"POST",body:build()});
  if(r.status===409){
    let c={}; try{ c=(await r.json()).error||{}; }catch(_e){}
    const keep=await conflictDialog(c.message, c.suggestion);
    if(!keep) return null;
    r=await api(url,{method:"POST",body:build({on_conflict:"keep-both"})});
  }
  return r;
}

/* ---- rename: inline edit-in-place (F2 / kebab), prompt fallback ---- */
function renameExt(n){
  // The extension is LOCKED to the true content type — you rename only the base.
  return n.type==="file"
    ? (trueExt(n.content_type) || (n.name.match(/\.([A-Za-z0-9]{1,6})$/)||[])[1] || "")
    : "";
}
function renameItem(n){
  // Locate this node's live tile/row and edit its name in place; fall back to a
  // prompt if it isn't on screen (e.g. the search results renderer) — or if the
  // preview overlay is up: the tile is in the DOM but COVERED, so the inline
  // input was invisible and the overlay stole focus straight back, committing an
  // unchanged name — rename "did nothing" (Mark, 2026-07-21).
  const el=document.querySelector('.tile[data-id="'+cssId(n.id)+'"], .lrow[data-id="'+cssId(n.id)+'"]');
  if(el && !document.querySelector(".viewer-bg")) inlineRename(el, n); else renameItemPrompt(n);
}
function cssId(id){ return String(id).replace(/["\\]/g,"\\$&"); }
function inlineRename(el, n){
  const nm=el.querySelector(".nm"); if(!nm || nm.querySelector(".rn-input")) return;
  const ext=renameExt(n);
  const base=ext ? n.name.replace(/\.[A-Za-z0-9]{1,6}$/,"") : n.name;
  const old=n.name, prev=nm.innerHTML, wasDraggable=el.draggable;
  const inp=document.createElement("input"); inp.type="text"; inp.className="rn-input";
  inp.value=base; inp.setAttribute("aria-label","Rename "+old);
  nm.innerHTML=""; nm.appendChild(inp); el.draggable=false;
  inp.focus(); inp.select();
  let settled=false;
  const restore=()=>{ nm.innerHTML=prev; el.draggable=wasDraggable; };
  const cancel=()=>{ if(settled)return; settled=true; restore(); };
  const commit=async ()=>{
    if(settled) return;
    const b=inp.value.trim();
    let name = ext ? (new RegExp("\\."+ext+"$","i").test(b) ? b : b+"."+ext) : b;
    if(!name || name===old){ cancel(); return; }
    settled=true;
    const r=await apiWithConflict("/api/rename",{node_id:n.id, name});
    if(r===null){ restore(); return; }                       // conflict cancelled
    if(!r.ok){ toast("✗ "+(((await r.json().catch(()=>({}))).error)||"Rename failed")); restore(); return; }
    const finalName=((await r.json().catch(()=>({}))).name)||name;
    openFolder(CURRENT);
    undoToast(`Renamed to “${finalName}”`, async ()=>{ await apiWithConflict("/api/rename",{node_id:n.id, name:old}); openFolder(CURRENT); });
  };
  inp.onmousedown=e=>e.stopPropagation();
  inp.onclick=e=>e.stopPropagation();
  inp.onkeydown=e=>{ e.stopPropagation();
    if(e.key==="Enter"){ e.preventDefault(); commit(); }
    else if(e.key==="Escape"){ e.preventDefault(); cancel(); } };
  inp.onblur=commit;
}
async function renameItemPrompt(n){
  const old=n.name, ext=renameExt(n);
  const base=ext ? n.name.replace(/\.[A-Za-z0-9]{1,6}$/,"") : n.name;
  const input=prompt(ext?`Rename (the .${ext} extension is fixed):`:"Rename to:", base);
  if(input===null) return;
  const b=input.trim();
  const name = ext ? (new RegExp("\\."+ext+"$","i").test(b)?b:b+"."+ext) : b;
  if(!name || name===old) return;
  const r=await apiWithConflict("/api/rename",{node_id:n.id, name});
  if(r===null) return;
  if(!r.ok){ toast("✗ "+(((await r.json().catch(()=>({}))).error)||"Rename failed")); return; }
  const finalName=((await r.json().catch(()=>({}))).name)||name;
  n.name=finalName;
  // If the preview overlay is showing this file, update its title in place.
  const vnm=document.querySelector(".viewer-top .vnm");
  if(vnm && vnm.textContent===old) vnm.textContent=finalName;
  openFolder(CURRENT);
  undoToast(`Renamed to “${finalName}”`, async ()=>{ await apiWithConflict("/api/rename",{node_id:n.id, name:old}); openFolder(CURRENT); });
}

/* ---- drag-to-move + inline-rename decoration for a rendered tile/row ---- */
let DRAG_IDS=null;
function nodeById(id){ return (LAST||[]).find(x=>x&&x.id===id); }
function isNodeDrag(e){
  return !!DRAG_IDS || (e.dataTransfer && [...e.dataTransfer.types].includes("application/x-xinsere-node"));
}
function decorateItem(el, n, mine){
  el.dataset.id=n.id;
  if(TRASH_MODE || !mine) return;   // only your own live items drag/drop
  el.draggable=true;
  el.addEventListener("dragstart",e=>{
    // Dragging one of a multi-selection carries the whole selection.
    const ids=(SEL.size>1 && SEL.has(n.id)) ? [...SEL] : [n.id];
    DRAG_IDS=ids;
    e.dataTransfer.effectAllowed="move";
    try{ e.dataTransfer.setData("application/x-xinsere-node", ids.join(",")); }catch(_e){}
    el.classList.add("dragging");
    e.stopPropagation();
  });
  el.addEventListener("dragend",()=>{ DRAG_IDS=null; el.classList.remove("dragging");
    document.querySelectorAll(".drop-target").forEach(x=>x.classList.remove("drop-target")); });
  if(n.type==="folder") makeDropTarget(el, n.id);
}
function makeDropTarget(el, folderId){
  el.addEventListener("dragover",e=>{
    if(!isNodeDrag(e)) return;                       // let OS-file drops fall through to upload
    if(DRAG_IDS && DRAG_IDS.includes(folderId)) return;   // can't drop onto a dragged item
    e.preventDefault(); e.stopPropagation();
    e.dataTransfer.dropEffect="move"; el.classList.add("drop-target");
  });
  el.addEventListener("dragleave",()=>el.classList.remove("drop-target"));
  el.addEventListener("drop",async e=>{
    if(!isNodeDrag(e)) return;
    e.preventDefault(); e.stopPropagation(); el.classList.remove("drop-target");
    const ids=DRAG_IDS || (e.dataTransfer.getData("application/x-xinsere-node")||"").split(",").filter(Boolean);
    const name=(nodeById(folderId)||{}).name;
    await moveNodesTo(ids, folderId, name);
  });
}
// Move a set of node ids into a target folder, with per-item conflict resolution
// (Keep both / Cancel) and on-chain share reconciliation. Shared by the Move dialog
// and drag-to-move. Silently skips items already in the destination.
async function moveNodesTo(ids, targetId, targetName){
  ids=(ids||[]).filter(id=>id && id!==targetId && (nodeById(id)||{}).parent!==targetId);
  if(!ids.length) return;
  const T=newTask(ids.length>1?`${ids.length} items`:((nodeById(ids[0])||{}).name||"item"));
  T.set("Moving & reconciling on-chain shares…",{indet:true});
  let ok=0, recErrors=0, failed=0, cancelled=0;
  for(const id of ids){
    const r=await apiWithConflict("/api/move",{node_id:id, new_parent:targetId});
    if(r===null){ cancelled++; continue; }
    if(r.ok){ ok++; recErrors+=(((await r.json().catch(()=>({}))).reconciliation)||{}).errors||0; }
    else failed++;
  }
  const dest=targetName?` to ${targetName}`:"";
  const probs=[failed?`${failed} failed`:"", cancelled?`${cancelled} skipped`:"",
    recErrors?`⚠ ${recErrors} on-chain share update${recErrors>1?"s":""} failed (retry via re-share)`:""].filter(Boolean).join(" · ");
  T.done(probs?`Moved ${ok}/${ids.length}${dest} — ${probs}`
              :(ids.length>1?`Moved ${ok} items${dest}`:`Moved${dest}`));
  selClear();
  openFolder(CURRENT);
}

async function listFolders(excludeIds){
  // Flatten the folder tree (owner's own) for the move picker, skipping the
  // subtrees rooted at excludeIds (a folder can't move into itself).
  // ONE request for all folders, tree assembled here — the old per-folder
  // recursive walk was O(folders) round-trips and crawled on big trees.
  const excl=new Set(excludeIds?[].concat(excludeIds):[]);
  const r=await api("/api/folders");
  if(!r.ok) throw new Error((await r.json().catch(()=>({}))).error||"Couldn't load folders");
  const d=await r.json();
  const byParent={};
  (d.folders||[]).forEach(f=>{ if(f.id!==d.root) (byParent[f.parent]=byParent[f.parent]||[]).push(f); });
  Object.values(byParent).forEach(a=>a.sort((x,y)=>(x.name||"").localeCompare(y.name||"")));
  const out=[{id:d.root, name:"My Files", depth:0}];
  (function dfs(id, depth){
    (byParent[id]||[]).forEach(f=>{
      if(excl.has(f.id)) return;
      out.push({id:f.id, name:f.name, depth});
      dfs(f.id, depth+1);
    });
  })(d.root, 1);
  return out;
}

async function openMove(n){
  // Accepts one node or an array (multi-select "Move N items to…").
  const nodes=Array.isArray(n)?n:[n];
  const title=nodes.length>1?`Move ${nodes.length} items`:`Move “${esc(nodes[0].name)}”`;
  const bg=document.createElement("div"); bg.className="modal-bg";
  bg.innerHTML=`<div class="modal"><h3>${title}</h3>
    <p class="msub">Choose a destination folder. Shares inherited from the old and new location are reconciled on-chain.</p>
    <div class="folderpick"><em style="color:var(--faint);font-size:0.82rem;">Loading folders…</em></div>
    <button class="btn-ghost btn full x">Cancel</button></div>`;
  bg.querySelector(".x").onclick=()=>bg.remove();
  bg.addEventListener("click",e=>{ if(e.target===bg) bg.remove(); });
  document.body.appendChild(bg);
  const holder=bg.querySelector(".folderpick");
  let folders;
  try{ folders=await listFolders(nodes.filter(x=>x.type==="folder").map(x=>x.id)); }
  catch(err){ holder.innerHTML=`<em style="color:var(--coral);font-size:0.82rem;">Couldn't load folders — ${esc(err.message||"try again")}</em>`; return; }
  holder.innerHTML="";
  folders.forEach(f=>{
    const b=document.createElement("button");
    b.style.paddingLeft=(10+f.depth*16)+"px";
    b.textContent="📁 "+f.name;
    if(f.id===CURRENT) b.disabled=true;   // already here
    b.onclick=async ()=>{
      bg.remove();
      // Shared with drag-to-move: per-item Keep both / Cancel + on-chain reconcile.
      await moveNodesTo(nodes.map(x=>x.id), f.id, f.name);
    };
    holder.appendChild(b);
  });
}

async function eraseItem(n, fromMain){

}

/* Disable a shared file's Download button until verify() reads the grant from
 * the contract. Retries a few times — a just-written grant can take a moment to
 * be visible on every RPC node. A view-only grant never enables Download. */
async function gateOnChain(n, btn){
  btn.disabled=true; btn.classList.add("loading"); btn.title="Confirming on-chain grant…";
  btn.innerHTML='<span class="btnspin"></span>';
  const restore=()=>{ btn.innerHTML=btn.dataset.icon?svg(btn.dataset.icon):"Download"; };
  for(let a=0;a<5;a++){
    try{
      const r=await api("/api/verify/"+n.id);
      if(r.ok){
        const v=await r.json();
        if(v.allowed && v.can_download!==false){
          btn.disabled=false; btn.classList.remove("loading"); restore();
          btn.title="Download — on-chain grant confirmed"; return;
        }
        if(v.allowed && v.can_download===false){
          btn.classList.remove("loading"); restore();
          btn.title="Your on-chain grant is view-only — use View"; return;
        }
      }
    }catch(e){}
    await new Promise(res=>setTimeout(res, 1500*(a+1)));
  }
  btn.classList.remove("loading"); restore();
  btn.title="No active on-chain grant found for you";
}

async function downloadFolder(n, btn){
  const T=newTask(n.name);
  if(btn){ btn.classList.add("loading"); btn.innerHTML='<span class="btnspin"></span>'; }
  const done=(m)=>{ T.done(m); if(btn){ btn.classList.remove("loading"); btn.innerHTML=svg(btn.dataset.icon||"download"); } };
  try{
    T.set("Reassembling folder & packing ZIP…",{indet:true});
    const r=await api("/api/download-folder/"+n.id);
    if(!r.ok){ done("✗ "+((await r.json()).error||"Folder download failed")); return; }
    const b=await r.blob(); const url=URL.createObjectURL(b);
    const a=document.createElement("a"); a.href=url; a.download=n.name+".zip"; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    done(`✓ ${n.name}.zip — ${r.headers.get("X-Files-Included")||"?"} files`);
  }catch(e){ done("✗ "+e.message); }

/* ---- download (on-chain check -> fetch -> verify bit-perfect) ---- */
async function downloadFile(n, btn){
  // Button shows a fixed-width spinner (not long text) so the card never reflows;
  // the descriptive per-stage status + progress bar live in this download's own
  // task line — concurrent downloads each get their own.
  const T=newTask(n.name);
  if(btn){ btn.classList.add("loading"); if(!btn.dataset.icon) btn.dataset.label=btn.textContent; btn.innerHTML='<span class="btnspin"></span>'; }
  const done=(msg)=>{ T.done(msg); if(btn){ btn.classList.remove("loading");
    if(btn.dataset.icon) btn.innerHTML=svg(btn.dataset.icon); else btn.textContent=btn.dataset.label||"Download"; } };
  try{
    T.set("Checking permission on-chain…",{indet:true});
    const rv=await api("/api/verify/"+n.id); const v=await rv.json();
    if(!v.allowed){ done("Blockchain: no active grant for you ✗"); return; }
    if(v.can_download===false){ done("Your access is view-only — use View instead ✗"); return; }

    // Preferred path: client-side reassembly. The server only issues a plan
    // (presigned fragment URLs + data keys); the browser pulls fragments straight
    // from storage and decrypts locally — plaintext never exists on the server.
    // Falls back to server-side reassembly if the plan isn't available.
    try{
      T.set("Requesting fragment map + keys…",{indet:true});
      const pr=await api("/api/download-plan/"+n.id);
      if(pr.ok){
        const plan=await pr.json();
        const {blob, sha256}=await XinsereClient.reassemble(plan, {
          // decrypt messages are suppressed — decrypt overlaps fetch, and flipping
          // the determinate bar to indeterminate mid-transfer reads as regression.
          onStage:(stage,msg)=>{ if(stage==="verify") T.set(msg,{indet:true}); },
          onProgress:(got,total)=> total
            ? T.set(`Fetching fragments — ${(got/total*100).toFixed(0)}% · ${fmtSize(got)} / ${fmtSize(total)}`,{pct:got/total*100})
            : T.set(`Fetching fragments — ${fmtSize(got)}…`,{indet:true}),
        });
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a"); a.href=url; a.download=dlName(n.name, n.content_type); document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
        done("✓ Bit-perfect — reassembled & verified in your browser · "+sha256.slice(0,10)+"…");
        return;
      }
    }catch(e){
      // Failover must be VISIBLE, not silent — otherwise the slow server path
      // looks like the product. Console + server log carry the real error.
      console.warn("xinsere: client-side reassembly failed, falling back to server:", e, e.xinsereEvents||[]);
      try{ api("/api/client-log",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({file:n.id,name:n.name,size:n.size,error:String(e.message||e),
                             events:(e.xinsereEvents||[]).slice(-40)})}); }catch(_){}
      T.set("Browser reassembly interrupted — falling back to server (slower)…",{indet:true});
    }

    // Fallback: server-side reassembly (pull fragments -> decrypt -> verify).
    const r=await api("/api/download/"+n.id);
    if(!r.ok){ let m="Download failed"; try{ m=(await r.json()).error||m; }catch(e){} done("✗ "+m); return; }
    const sha=r.headers.get("X-Content-SHA256")||"";
    // Stream the response so we can show real transfer progress on big files.
    const total = n.size || parseInt(r.headers.get("Content-Length")||"0",10) || 0;
    let blob;
    if(r.body && r.body.getReader){
      const reader=r.body.getReader(); const chunks=[]; let got=0;
      while(true){
        const {done:d, value}=await reader.read(); if(d) break;
        chunks.push(value); got+=value.length;
        if(total) T.set(`Downloading — ${(got/total*100).toFixed(0)}% · ${fmtSize(got)} / ${fmtSize(total)}`,{pct:got/total*100});
        else T.set(`Downloading — ${fmtSize(got)}…`,{indet:true});
      }
      blob=new Blob(chunks, {type:r.headers.get("Content-Type")||"application/octet-stream"});
    } else {
      T.set("Preparing file…",{indet:true}); blob=await r.blob();
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=dlName(n.name, n.content_type); document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    done(r.headers.get("X-Watermarked")==="true"
      ? "✓ Verified · forensically watermarked — this copy is traceable to you"+(sha?" · "+sha.slice(0,10)+"…":"")
      : "✓ Bit-perfect — SHA-256 verified"+(sha?" · "+sha.slice(0,10)+"…":""));
  }catch(e){ done("✗ Download failed — "+(e.message||e)); }
}

/* ---- create / upload ---- */
// Sort like the backend: folders first, then by name (for optimistic inserts).
function sortNodes(a,b){ return (a.type!=="folder")-(b.type!=="folder") || (a.name||"").toLowerCase().localeCompare((b.name||"").toLowerCase()); }
$("#new-folder").addEventListener("click", async ()=>{
  const name=prompt("Folder name:"); if(!name) return;
  const r=await apiWithConflict("/api/folder",{name, parent:CURRENT});
  if(r===null) return;   // name conflict, user cancelled
  if(!r.ok){ toast("✗ "+((await r.json()).error||"Could not create folder")); return; }
  // Optimistic: drop the returned node straight into the current view instead of
  // re-fetching the whole tree (that second round-trip made it feel slow).
  const node=await r.json();
  if(VIEW==="mine" && node.parent===CURRENT){ LAST.push(node); LAST.sort(sortNodes); renderGrid(LAST, LAST_MANAGE); }
  else openFolder(CURRENT);
  toast("Folder created");
});
$("#up-file").addEventListener("click", ()=>$("#file-input").click());
$("#up-folder").addEventListener("click", ()=>$("#folder-input").click());
$("#file-input").addEventListener("change", (e)=>uploadFiles([...e.target.files]));
$("#folder-input").addEventListener("change", (e)=>uploadFiles([...e.target.files], true));

// PUT straight to S3 via XHR (not fetch) so we get real upload progress events.
function putWithProgress(url, file, onpct){
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open("PUT", url, true);
    xhr.upload.onprogress=(e)=>{ if(e.lengthComputable) onpct(e.loaded/e.total*100); };
    xhr.onload=()=> (xhr.status>=200 && xhr.status<300) ? resolve() : reject(new Error("storage PUT "+xhr.status));
    xhr.onerror=()=> reject(new Error("network error"));
    xhr.send(file);   // browser sets Content-Type from file.type; SigV4 leaves it unsigned
  });
}

async function uploadFiles(files, withPaths=false){
  if(!files.length) return;
  // Direct-to-S3: each file is PUT straight to the staging bucket via a presigned
  // URL (no 4.5 MB function cap), then finalized through the pipeline. Every stage
  // uses a sticky progress status so long uploads never look frozen.
  // One task line for the whole batch — parallel downloads keep their own lines.
  const T=newTask(files.length>1 ? `${files.length} files` : files[0].name);
  let done=0, failed=false;
  for(let i=0;i<files.length && !failed;i++){
    const f=files[i];
    const rel = withPaths ? (f.webkitRelativePath||f.name) : f.name;
    const tag = files.length>1 ? `${f.name} · ${i+1}/${files.length}` : f.name;
    T.set(`Uploading ${tag} — 0% · ${fmtSize(f.size)}`,{pct:0});
    const uf=new FormData(); uf.append("parent",CURRENT);
    const ur=await api("/api/upload-url",{method:"POST",body:uf});
    if(!ur.ok){ T.done("✗ "+((await ur.json()).error||"Could not start upload")); failed=true; break; }
    const {key,url}=await ur.json();
    // Retry the PUT up to 3 times with backoff — transient network/S3 blips must
    // not fail the upload. (A single PUT restarts whole-file; chunk-level resume
    // via S3 multipart is the planned upgrade for very large files.)
    let uploaded=false;
    for(let a=0;a<3 && !uploaded;a++){
      try{
        if(a) T.set(`Retrying upload (${a+1}/3) ${tag} — 0% · ${fmtSize(f.size)}`,{pct:0});
        await putWithProgress(url, f, (pct)=> T.set(`Uploading ${tag} — ${pct.toFixed(0)}% · ${fmtSize(f.size)}`,{pct}));
        uploaded=true;
      }catch(e){
        console.warn("xinsere: upload PUT failed (attempt "+(a+1)+"):", e);
        if(a<2) await new Promise(r=>setTimeout(r, 600*(a+1)));
      }
    }
    if(!uploaded){ T.done("✗ Direct upload to storage failed after 3 attempts"); failed=true; break; }
    // Server-side fragment/encrypt/scatter — duration unknown, so indeterminate.
    T.set(`Securing ${tag} · fragmenting + encrypting + scattering…`,{indet:true});
    const ff=new FormData();
    ff.append("key",key); ff.append("name",f.name); ff.append("parent",CURRENT);
    ff.append("path",rel); ff.append("content_type",f.type||"application/octet-stream");
    const fin=await api("/api/finalize-upload",{method:"POST",body:ff});
    if(!fin.ok){ T.done("✗ "+((await fin.json()).error||"Finalize failed")); failed=true; break; }
    done++;
  }
  if(!failed) T.done(done ? `✓ Secured ${done} file${done>1?"s":""} · fragmented + encrypted + scattered` : "Upload cancelled");
  openFolder(CURRENT);
  $("#file-input").value=""; $("#folder-input").value="";
}

/* drag & drop — OS files here upload; an INTERNAL node drag is handled by the
   per-item drop targets (drag-to-move), so the grid ignores it (no upload glow). */
const grid=$("#grid");
["dragenter","dragover"].forEach(ev=>grid.addEventListener(ev,e=>{ if(isNodeDrag(e))return; e.preventDefault(); if(VIEW==="mine")grid.classList.add("over");}));
["dragleave","drop"].forEach(ev=>grid.addEventListener(ev,e=>{e.preventDefault();grid.classList.remove("over");}));
grid.addEventListener("drop",e=>{ if(VIEW!=="mine"||isNodeDrag(e))return; const fs=[...e.dataTransfer.files]; if(fs.length) uploadFiles(fs); });

/* ---- share modal ---- */
function openShare(node){
  const bg=document.createElement("div"); bg.className="modal-bg";
  const TZ=(Intl.DateTimeFormat().resolvedOptions().timeZone||"local time");
  bg.innerHTML=`<div class="modal" style="width:min(560px,94vw);max-width:none;position:relative;">
    <button class="x-close" type="button" aria-label="Close" title="Close">✕</button>
    <h3>Share “${node.name}”</h3>
    <p class="msub">${node.type==="folder"?"Everyone you add can access every file inside.":"Choose what people you add are allowed to do."}</p>
    <div class="perm-opts" role="radiogroup" aria-label="Permission level">
      <label class="perm-opt"><input type="radio" name="share-perm" value="view">
        <span><b>Read only</b><i>View in the browser — no download</i></span></label>
      <label class="perm-opt"><input type="radio" name="share-perm" value="download" checked>
        <span><b>Download / Edit</b><i>View and download files</i></span></label>
      <label class="perm-opt"><input type="radio" name="share-perm" value="co-owner">
        <span><b>Co-Owner</b><i>Full access — can re-share with others</i></span></label>
    </div>
    <details class="share-window" style="margin:2px 0 10px;">
      <summary>🕒 <b>Access window</b> <span class="win-sum">optional — set a start &amp; expiry</span><span class="chev">▾</span></summary>
      <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;">
        <label style="flex:1;min-width:180px;font-size:12px;color:var(--faint);">Starts
          <input class="win-start" type="datetime-local"
            style="width:100%;margin-top:3px;padding:8px 10px;border-radius:8px;border:1px solid var(--line,#2a3550);background:transparent;color:inherit;font-size:13px;"></label>
        <label style="flex:1;min-width:180px;font-size:12px;color:var(--faint);">Expires
          <input class="win-expiry" type="datetime-local"
            style="width:100%;margin-top:3px;padding:8px 10px;border-radius:8px;border:1px solid var(--line,#2a3550);background:transparent;color:inherit;font-size:13px;"></label>
      </div>
      <p class="msub" style="margin:6px 0 0;font-size:11.5px;">Times are in your local timezone (${TZ}). Leave blank for immediate start / no expiry. Enforced on-chain — an expired grant simply stops verifying, no revoke needed.</p>
    </details>
    <input class="share-q" type="text" autocomplete="off" placeholder="Add people — search your network, or type an email to invite…"
      style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--line,#2a3550);background:transparent;color:inherit;font-size:14px;">
    <div class="results" style="margin:6px 0 2px;max-height:220px;overflow:auto;"></div>
    <div class="chips"></div>
    <div class="current"></div>
    <div class="share-status" style="display:none;margin-top:8px;"></div>
    <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end;align-items:center;">
      <button class="btn-ghost btn share-restart hidden" type="button">Start Over</button>
      <button class="btn share-go" type="button" disabled>Share</button>
    </div></div>`;

  const results=bg.querySelector(".results");
  const current=bg.querySelector(".current");
  const close=()=>{ if(bg.parentNode) document.body.removeChild(bg); };
  const refresh=()=>{ close(); openFolder(CURRENT); };

  const permVal=()=>bg.querySelector('input[name="share-perm"]:checked').value;
  const permSel={get value(){return permVal();}};

  // Access window (0020): datetime-local carries LOCAL wall time; Date.parse gives
  // the correct epoch for the browser's tz, so we post unix seconds and the server
  // does no tz guessing. Blank = unbounded (immediate start / never expires).
  const winS=bg.querySelector(".win-start"), winE=bg.querySelector(".win-expiry");
  function appendWindow(fd){
    if(winS.value){ const t=Date.parse(winS.value); if(!isNaN(t)) fd.append("starts_at", Math.floor(t/1000)); }
    if(winE.value){ const t=Date.parse(winE.value); if(!isNaN(t)) fd.append("expires_at", Math.floor(t/1000)); }
  }
  function windowError(){
    if(winS.value&&winE.value&&Date.parse(winS.value)>=Date.parse(winE.value)) return "The start time must be before the expiry.";
    if(winE.value&&Date.parse(winE.value)<=Date.now()) return "The expiry time is already in the past.";
    return null;
  }
  // The collapsed summary line always shows what's set, so a window is never
  // hidden behind the expander; clicking a field opens the native calendar+clock.
  const winSum=bg.querySelector(".win-sum");
  const fmt=v=>new Date(v).toLocaleString([], {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
  function updateWinSum(){
    const parts=[];
    if(winS.value) parts.push("starts "+fmt(winS.value));
    if(winE.value) parts.push("expires "+fmt(winE.value));
    winSum.textContent=parts.length?parts.join(" · "):"optional — set a start & expiry";
    winSum.classList.toggle("on", !!parts.length);
  }
  [winS,winE].forEach(inp=>{
    inp.addEventListener("input", updateWinSum);
    inp.addEventListener("click", ()=>{ try{ inp.showPicker(); }catch(_e){} });
  });

  // ONE recipient list for everyone — network people AND email invitees queue as
  // chips (dashed chip = invite), then a single Share click processes the lot:
  // network grantees in one batched request, each email through the invite path.
  const PENDING=new Map();   // key: uid or lowercased email -> {kind:"user"|"email", id, label}
  const chips=bg.querySelector(".chips"), goBtn=bg.querySelector(".share-go");
  const restartBtn=bg.querySelector(".share-restart"), statusEl=bg.querySelector(".share-status");
  let SHARED=false;          // after a successful share: Share button becomes Done
  function status(msg, err){
    statusEl.style.display=msg?"block":"none"; statusEl.textContent=msg||"";
    statusEl.classList.toggle("err", !!err);
  }
  function renderChips(){
    chips.innerHTML="";
    for(const [key,p] of PENDING){
      const c=document.createElement("span"); c.className="chip"+(p.kind==="email"?" email":"");
      c.innerHTML=`${p.kind==="email"?"✉ ":""}${esc(p.label)} <button type="button" aria-label="Remove">✕</button>`;
      c.querySelector("button").onclick=()=>{ PENDING.delete(key); renderChips(); };
      chips.appendChild(c);
    }
    if(!SHARED){
      goBtn.disabled=!PENDING.size;
      goBtn.textContent=PENDING.size?`Share with ${PENDING.size} ${PENDING.size===1?"person":"people"}`:"Share";
    }
  }
  function queueUser(uid, name){ PENDING.set(uid, {kind:"user", id:uid, label:(name||"").split(" ")[0]||name}); renderChips(); q.value=""; results.innerHTML=""; }
  function queueEmail(email){ const e=email.trim().toLowerCase(); if(!e) return;
    PENDING.set(e, {kind:"email", id:e, label:e}); renderChips(); q.value=""; results.innerHTML=""; }
  function startOver(){
    PENDING.clear(); SHARED=false; q.value=""; results.innerHTML="";
    winS.value=""; winE.value=""; updateWinSum(); status("");
    restartBtn.classList.add("hidden"); renderChips(); q.focus();
  }
  restartBtn.onclick=startOver;
  async function doShare(){
    const werr=windowError(); if(werr){ status("✗ "+werr, true); return; }
    const users=[...PENDING.values()].filter(p=>p.kind==="user");
    const mails=[...PENDING.values()].filter(p=>p.kind==="email");
    goBtn.disabled=true; goBtn.textContent="Recording grants on-chain…"; status("");
    const base=()=>{ const fd=new FormData(); fd.append("node_id",node.id);
      fd.append("share_type",permSel.value); appendWindow(fd); return fd; };
    let granted=0, invited=0; const errors=[];
    if(users.length){
      try{
        const fd=base(); fd.append("grantee", users.map(u=>u.id).join(","));
        const r=await api("/api/share",{method:"POST",body:fd});
        const d=await r.json().catch(()=>({}));
        if(r.ok){ granted+=d.granted||0; if(d.failed) errors.push(`${d.failed} in your network failed`); }
        else errors.push(d.error||`network share failed (${r.status})`);
      }catch(_e){ errors.push("network share didn't complete — connection lost"); }
    }
    for(const m of mails){
      try{
        const fd=base(); fd.append("email", m.id);
        const r=await api("/api/share",{method:"POST",body:fd});
        const d=await r.json().catch(()=>({}));
        if(r.ok){ if(d.invited) invited++; else granted++; }
        else errors.push(`${m.id}: ${d.error||"failed ("+r.status+")"}`);
      }catch(_e){ errors.push(`${m.id}: didn't complete`); }
    }
    const bits=[];
    if(granted) bits.push(`shared with ${granted} ${granted===1?"person":"people"} — recorded on-chain`);
    if(invited) bits.push(`${invited} ${invited===1?"invitation":"invitations"} sent — they'll get access when they join`);
    if(winE.value&&(granted||invited)) bits.push(`expires ${fmt(winE.value)}`);
    // Closing the dialog doesn't cancel anything — the requests are already at the
    // server. If it's gone by the time we finish, report through a toast instead.
    if(!bg.parentNode){
      toast(errors.length?`✗ ${errors.join(" · ")}`:`✓ Share finished — ${bits.join(" · ")||"nothing to do"}`);
      if(!errors.length) openFolder(CURRENT);
      return;
    }
    if(errors.length){
      status(`✗ ${errors.join(" · ")}${bits.length?` — otherwise: ${bits.join(" · ")}`:""} Press Share to retry.`, true);
      goBtn.disabled=false; renderChips(); restartBtn.classList.remove("hidden");
    } else {
      status(`✓ ${bits.length?bits.join(" · ").replace(/^./,c=>c.toUpperCase()):"Nothing to do."}`);
      SHARED=true; PENDING.clear(); chips.innerHTML="";
      goBtn.textContent="Done"; goBtn.disabled=false; restartBtn.classList.remove("hidden");
      openFolder(CURRENT);   // refresh the grid behind the dialog
    }
  }
  goBtn.onclick=()=>{ SHARED ? refresh() : doShare(); };

  // Revoke an existing grantee (on-chain per file; fails closed).
  async function revokeUser(u){
    if(!confirm(`Revoke ${u.name.split(" ")[0]}'s access to “${node.name}”?\nThis writes an on-chain revocation for every file covered.`)) return;
    const T=newTask(node.name); T.set(`Revoking ${u.name.split(" ")[0]}'s access on-chain…`,{indet:true});
    // The task toast must ALWAYS resolve — a dropped connection or a gateway
    // timeout (non-JSON body) left it spinning forever (2026-07-15).
    try{
      const fd=new FormData(); fd.append("node_id",node.id); fd.append("grantee",u.id);
      const r=await api("/api/unshare",{method:"POST",body:fd});
      if(r.ok){ const d=await r.json();
        T.done(`✓ Access revoked · ${d.files_revoked} file${d.files_revoked!==1?"s":""} on-chain${d.tx?` · ${d.tx.slice(0,12)}…`:""}`); refresh(); }
      else {
        let msg=`Revoke failed (${r.status}) — retry`;
        try{ msg=(await r.json()).error||msg; }catch(_e){}
        T.done("✗ "+msg);
      }
    }catch(_e){ T.done("✗ Revoke didn't complete — connection lost or timed out. Retry; already-revoked files are skipped."); }
  }

  // Current grantees, each with a revoke button and their own validity window —
  // shares accumulate per person, so start/expiry can differ row to row.
  function personWindow(u){
    const now=Date.now()/1000, nb=u.not_before||0, na=u.not_after||0;
    const f=ts=>new Date(ts*1000).toLocaleString([], {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
    if(na&&na<=now)  return `<span style="color:var(--coral)">expired ${f(na)}</span>`;
    if(nb&&nb>now)   return `<span style="color:var(--faint)">starts ${f(nb)}${na?` · until ${f(na)}`:""}</span>`;
    if(na)           return `<span style="color:var(--faint)">until ${f(na)}</span>`;
    return "";
  }
  function renderCurrent(){
    current.innerHTML=(node.shared_with||[]).length?`<p class="msub" style="margin:8px 0 4px;">Shared with <span style="opacity:.65">— re-add a person to change their permission</span></p>`:``;
    (node.shared_with||[]).forEach(u=>{
      const row=document.createElement("div"); row.className="person";
      const lvl=u.share_type==="view"?"read only":u.share_type==="co-owner"?"co-owner":"download / edit";
      const win=personWindow(u);
      const via=u.inherited?` · <span style="color:var(--faint)" title="Shared on the folder — manage it there">via “${esc(u.via||"parent folder")}”</span>`:"";
      row.innerHTML=`${avatarHtml(u)}<span class="nm">${u.name||u.email||u.id}</span><span class="st">${lvl} ✓${win?` · ${win}`:""}${via}</span>`;
      if(!u.inherited){
        const rm=document.createElement("button"); rm.className="rm"; rm.textContent="Revoke";
        rm.onclick=(e)=>{ e.stopPropagation(); revokeUser(u); };
        row.appendChild(rm);
      }
      current.appendChild(row);
    });
  }
  renderCurrent();

  // Typeahead: debounced search against /api/users/search. A term that is a full
  // email address ALSO offers an invite row (unless it matches a network profile),
  // so new people queue as chips exactly like people already on Xinsere.
  const q=bg.querySelector(".share-q"); let timer=null, seq=0;
  // Inherited entries don't block a direct re-add — sharing directly on this node
  // can RAISE the person's level above what the folder share gave them.
  const sharedIds=new Set((node.shared_with||[]).filter(s=>!s.inherited).map(s=>s.id));
  const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  function inviteRow(term){
    const b=document.createElement("button"); b.className="person"; b.type="button";
    b.innerHTML=`<span class="nm">✉ Invite ${esc(term.toLowerCase())}</span><span class="st">new to Xinsere — added on join</span>`;
    if(PENDING.has(term.toLowerCase())) b.disabled=true; else b.onclick=()=>queueEmail(term);
    return b;
  }
  q.oninput=()=>{
    clearTimeout(timer);
    const term=q.value.trim(); const mine=++seq;
    if(!term){ results.innerHTML=""; return; }
    timer=setTimeout(async ()=>{
      const r=await api("/api/users/search?q="+encodeURIComponent(term));
      if(!r.ok || mine!==seq) return;
      const {results:people}=await r.json();
      const isEmail=EMAIL_RE.test(term);
      results.innerHTML = (people.length||isEmail)?"":`<p class="msub" style="padding:6px 2px;">No matches — type a full email address to invite someone new.</p>`;
      people.forEach(u=>{
        const b=document.createElement("button"); b.className="person"; b.type="button";
        const already=sharedIds.has(u.id);
        b.innerHTML=`${avatarHtml(u)}<span class="nm">${u.name||u.email}</span>`+(already?`<span class="st">shared ✓</span>`:``);
        if(already||PENDING.has(u.id)){ b.disabled=true; } else { b.onclick=()=>queueUser(u.id,u.name||u.email); }
        results.appendChild(b);
      });
      if(isEmail && !people.some(u=>(u.email||"").toLowerCase()===term.toLowerCase()))
        results.appendChild(inviteRow(term));
    },220);
  };
  q.onkeydown=(e)=>{ if(e.key==="Enter"){ e.preventDefault();
    const term=q.value.trim(); if(EMAIL_RE.test(term)) queueEmail(term); } };

  // Nothing queued is committed until Share, so closing at any point is safe;
  // after a successful share, X and Done are equivalent.
  bg.querySelector(".x-close").onclick=()=>{ SHARED ? refresh() : close(); };
  bg.addEventListener("click",e=>{ if(e.target===bg) close(); });
  const onEsc=(e)=>{ if(e.key==="Escape"){ close(); document.removeEventListener("keydown",onEsc); } };
  document.addEventListener("keydown",onEsc);
  document.body.appendChild(bg);
  setTimeout(()=>q.focus(),40);
}

/* ---- grid/list view toggle (list default; persisted) ---- */
/* Wired here, AFTER all definitions (ICON/svg) — running it earlier hit the
 * const ICON temporal dead zone and threw at load, breaking the login handler. */
function applyLayoutButtons(){ document.querySelectorAll("#viewtoggle button").forEach(b=>b.classList.toggle("on", b.dataset.layout===LAYOUT)); }
document.querySelectorAll("#viewtoggle button").forEach(b=>{
  b.innerHTML = b.dataset.layout==="list" ? svg("listv") : svg("gridv");
  b.addEventListener("click", ()=>{ LAYOUT=b.dataset.layout; localStorage.setItem("xin-layout",LAYOUT); applyLayoutButtons();
    // Re-render IN PLACE. The search page isn't fed by renderGrid — re-running the
    // search keeps the user on their results instead of dumping them back in My Files.
    if(CUR_LOC && CUR_LOC.kind==="search") showSearchResults(CUR_LOC.term);
    else renderGrid(LAST, LAST_MANAGE); });
});
applyLayoutButtons();

/* auto-login if session exists */
boot();
</script>
