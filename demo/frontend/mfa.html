<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Two-factor verification · Xinsere</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20200%20200%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22xm%22%20x1%3D%22100%25%22%20y1%3D%220%25%22%20x2%3D%220%25%22%20y2%3D%22100%25%22%3E%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%238A6BFF%22/%3E%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%237C5BFF%22/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20rx%3D%2246%22%20fill%3D%22%230A0713%22/%3E%3Cline%20x1%3D%22142%22%20y1%3D%2258%22%20x2%3D%2258%22%20y2%3D%22142%22%20stroke%3D%22url%28%23xm%29%22%20stroke-width%3D%2230%22%20stroke-linecap%3D%22round%22/%3E%3Ccircle%20cx%3D%22142%22%20cy%3D%2258%22%20r%3D%2238%22%20fill%3D%22url%28%23xm%29%22/%3E%3Ccircle%20cx%3D%2258%22%20cy%3D%22142%22%20r%3D%2238%22%20fill%3D%22url%28%23xm%29%22/%3E%3Ccircle%20cx%3D%2256%22%20cy%3D%2256%22%20r%3D%2238%22%20fill%3D%22url%28%23xm%29%22/%3E%3Ccircle%20cx%3D%22144%22%20cy%3D%22144%22%20r%3D%2238%22%20fill%3D%22url%28%23xm%29%22/%3E%3C/svg%3E">
<script>document.documentElement.dataset.theme=localStorage.getItem("xin-theme")||"dark";</script>
<style>
  :root{--bg:#0b0d1a;--panel:#141830;--panel-2:#1b2040;--edge:#2a3060;--text:#eef1ff;--muted:#9aa3c7;--brand:#8A6BFF;--violet:#5B3DF5;--mint:#4FE3C1;--rose:#FF8B7A;}
  :root[data-theme="light"]{--bg:#F4F2FB;--panel:#FFFFFF;--panel-2:#EFEDF9;--edge:rgba(91,61,245,0.22);--text:#1B1533;--muted:#5E5A78;--brand:#5B3DF5;--mint:#0E8E74;--rose:#C7452F;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:15px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    min-height:100vh;display:grid;place-items:center;padding:20px;}
  .card{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--edge);border-radius:18px;padding:32px}
  .brand{font-weight:600;color:var(--brand);font-size:1.05rem;margin-bottom:20px}
  h1{font-size:1.35rem;margin:0 0 6px}
  .sub{color:var(--muted);margin:0 0 22px;font-size:.94rem}
  label{display:block;font-size:.85rem;color:var(--muted);margin:0 0 6px}
  input{width:100%;padding:13px 14px;border-radius:10px;border:1px solid var(--edge);background:var(--panel-2);
    color:var(--text);font-size:1.4rem;letter-spacing:.4em;text-align:center;font-family:ui-monospace,monospace}
  .btn{background:linear-gradient(135deg,var(--brand),var(--violet));color:#fff;border:0;border-radius:10px;
    padding:13px 18px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:16px;width:100%}
  .btn:disabled{opacity:.5;cursor:default}
  .err{color:var(--rose);font-size:.9rem;min-height:1.3em;margin-top:12px}
  .foot{color:var(--muted);font-size:.85rem;margin-top:18px;text-align:center}
  .foot a{color:var(--brand);text-decoration:none;background:none;border:0;cursor:pointer;font:inherit}
</style>
</head>
<body>
<div class="card">
  <div class="brand">Xinsere</div>
  <h1>Two-factor verification</h1>
  <p class="sub">Enter the 6-digit code from your authenticator app to finish signing in. This step is required — your account can't be accessed without it.</p>
  <label for="code">Authentication code</label>
  <input id="code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="000000" autofocus>
  <button class="btn" id="go" type="button">Verify &amp; continue</button>
  <div class="err" id="err"></div>
  <div class="foot"><a id="signout">Sign out instead</a></div>
</div>
<script>
"use strict";
const $=s=>document.querySelector(s);
let FACTOR="";
const api=(p,o={})=>fetch(p,{credentials:"same-origin",...o});

async function init(){
  // Confirm we're actually MFA-pending; if not, leave. Also grab the factor id.
  try{
    const r=await api("/api/me");
    if(r.status===401){ location.href="/"; return; }
    const d=await r.json();
    if(!d.mfa_required){ location.href="/"; return; }   // already satisfied
    FACTOR=d.mfa_factor_id||"";
  }catch(e){ location.href="/"; }
}
async function verify(){
  const code=($("#code").value||"").trim();
  if(code.length<6){ $("#err").textContent="Enter the 6-digit code."; return; }
  const b=$("#go"); b.disabled=true; b.textContent="Verifying…"; $("#err").textContent="";
  try{
    const fd=new FormData(); fd.append("factor_id",FACTOR); fd.append("code",code);
    const r=await api("/api/account/mfa/verify",{method:"POST",body:fd});
    if(r.ok){ location.href="/"; return; }
    const d=await r.json().catch(()=>({}));
    $("#err").textContent=d.detail||d.error||"Invalid or expired code — try again.";
  }catch(e){ $("#err").textContent="Verification failed — try again."; }
  b.disabled=false; b.textContent="Verify & continue"; $("#code").value=""; $("#code").focus();
}
$("#go").addEventListener("click",verify);
$("#code").addEventListener("keydown",e=>{ if(e.key==="Enter") verify(); });
$("#code").addEventListener("input",e=>{ if(e.target.value.length===6) verify(); });
$("#signout").addEventListener("click",async()=>{ await api("/api/logout",{method:"POST"}); location.href="/"; });
init();
</script>
</body>
</html>
